<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>House-L — Nay Win Aung</title>
  <meta name="description" content="Visualisation for an L-shaped concept residence, exploring massing, materiality, and spatial organisation.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='26'>⌂</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@300;400&family=Quicksand:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f5f4f0;
      --ink:       #1a1a18;
      --ink-faint: #9a9890;
      --serif:     'EB Garamond', Georgia, serif;
      --sans:      'Quicksand', sans-serif;
      --mono:      'DM Mono', monospace;
      --nav-h:     56px;
      --gutter:    clamp(24px, 5vw, 72px);
    }

    html { scroll-behavior: smooth; }

    html { scrollbar-width: none; }
    ::-webkit-scrollbar { display: none; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
  font-weight: 400;
      font-size: 17px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    nav#main-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--gutter);
      background: var(--bg);
      z-index: 100;
      border-bottom: 1px solid #dddbd5;
    }
    .nav-logo {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 300;
      letter-spacing: .04em;
      color: var(--ink);
      text-decoration: none;
      white-space: nowrap;
    }
    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }
    .nav-links a {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 300;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--ink-faint);
      text-decoration: none;
      transition: color .2s;
    }
    .nav-links a:hover { color: var(--ink); }

    /* ── HAMBURGER NAV (mobile) ───────────────────────────── */
    .nav-hamburger {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      margin-right: -4px;
    }
    .nav-hamburger svg {
      display: block;
      width: 20px; height: 14px;
      stroke: var(--ink);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
    }
    @media (max-width: 600px) {
      .nav-hamburger { display: flex; align-items: center; }
      .nav-links {
        display: none;
        position: absolute;
        top: var(--nav-h);
        left: 0; right: 0;
        background: var(--bg);
        flex-direction: column;
        gap: 0;
        border-bottom: 1px solid #dddbd5;
        padding: 8px 0;
        z-index: 99;
      }
      .nav-links.open { display: flex; }
      .nav-links li { width: 100%; }
      .nav-links a {
        display: block;
        padding: 12px var(--gutter);
        font-size: 12px;
        letter-spacing: .1em;
      }
    }

    .project-header {
      margin-top: var(--nav-h);
      max-width: 1400px;
      margin-left: auto;
      margin-right: auto;
      padding: 48px var(--gutter) 64px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: stretch;
      border-bottom: 1px solid #dddbd5;
    }
    .project-hero {
      height: 100%;
    }
    .project-hero img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
    }
    .project-info { padding-top: 8px; }
    .project-title {
      font-family: var(--sans);
  font-weight: 400;
      font-size: clamp(28px, 3vw, 46px);
      font-weight: 400;
      font-style: italic;
      line-height: 1.1;
      margin-bottom: 28px;
    }
    .project-desc {
      font-family: var(--sans);
      font-size: 16px;
      font-weight: 300;
      color: #444;
      line-height: 1.8;
      margin-bottom: 36px;
    }
    .project-meta { display: flex; flex-direction: column; gap: 8px; }
    .project-meta-row { display: flex; align-items: baseline; gap: 16px; }
    .project-meta-label {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 300;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--ink-faint);
      min-width: 80px;
    }
    .project-meta-value {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 300;
      letter-spacing: .04em;
      color: var(--ink);
    }

    .project-images {
      max-width: 1400px;
      margin: 0 auto;
      padding: 48px var(--gutter) 96px;
    }
    .project-images img {
      display: block;
      width: 100%;
      height: auto;
      margin-bottom: 16px;
    }

    footer {
      border-top: 1px solid #dddbd5;
      padding: 28px var(--gutter);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    footer span {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 300;
      letter-spacing: .1em;
      color: var(--ink-faint);
    }

    /* ── SCROLL TO TOP ─────────────────────────────────────── */
    #scroll-top {
      position: fixed;
      bottom: 36px; right: 36px;
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 1px solid #ccc;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s, border-color .2s, background .2s;
      z-index: 99;
    }
    #scroll-top.visible { opacity: 1; pointer-events: auto; }
    #scroll-top:hover { border-color: var(--ink); background: var(--ink); }
    #scroll-top svg {
      width: 14px; height: 14px;
      stroke: var(--ink); fill: none;
      stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
      transition: stroke .2s;
    }
    #scroll-top:hover svg { stroke: var(--bg); }
    @media (max-width: 480px) { #scroll-top { bottom: 20px; right: 20px; } }

    @media (max-width: 768px) {
      .project-header { grid-template-columns: 1fr; gap: 32px; padding-top: 32px; }
    }

    /* ── PAGE-NUMBER COVER + COPYRIGHT ─────────────────────── */
    .img-wrap {
      position: relative;
      display: block;
      margin-bottom: 16px;
      line-height: 0;
    }
    .img-wrap img {
      display: block;
      width: 100%;
      height: auto;
      margin-bottom: 0;
    }
    .img-wrap::after {
      content: '';
      position: absolute;
      bottom: 0;
      right: 0;
      width: 5%;
      aspect-ratio: 2.2 / 1;
      background: #fafafa;
    }
    .img-wrap::before {
      content: '\00a9\a0 Design 2000 co. ltd';
      position: absolute;
      bottom: 0;
      left: 0;
      z-index: 1;
      font-family: var(--mono);
      font-weight: 700;
      font-size: 9px;
      letter-spacing: 0.04em;
      color: var(--ink);
      background: #fafafa;
      padding: 5px 10px;
      line-height: 1;
    }

    /* ── CUSTOM SCROLL INDICATOR ───────────────────────────── */
    #scroll-track {
      position: fixed;
      right: 18px;
      top: 14%;
      height: 72%;
      width: 1px;
      background: rgba(154, 152, 144, 0.20);
      z-index: 98;
      pointer-events: none;
    }
    #scroll-thumb {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 3px;
      height: 32px;
      border-radius: 2px;
      background: rgba(154, 152, 144, 0.50);
      top: 0;
      transition: top .12s linear;
    }
    @media (max-width: 768px) { #scroll-track { display: none; } }
  </style>
</head>
<body>
  <div id="nav-mount"></div>

  <div class="project-header">
    <div class="project-hero">
      <img src="../images/house-l/hero.png" alt="House-L">
    </div>
    <div class="project-info">
      <h1 class="project-title">House-L</h1>
      <p class="project-desc">
        Schematic floor plans for a compact 2 bedroom residence, 2D plan with rendered 3D plan for complementary visualisation.
      </p>
      <div class="project-meta">
        <div class="project-meta-row">
          <span class="project-meta-label">Year</span>
          <span class="project-meta-value">2022</span>
        </div>
        <div class="project-meta-row">
          <span class="project-meta-label">Type</span>
          <span class="project-meta-value">Concept</span>
        </div>
        <div class="project-meta-row">
          <span class="project-meta-label">Role</span>
          <span class="project-meta-value">Modeling, Drafting, Visualisation</span>
        </div>
      </div>
    </div>
  </div>

  <div class="project-images">
    <div class="img-wrap"><img src="../images/house-l/01.png" alt=""></div>
  </div>
  <div id="footer-mount"></div>

  <script>window.SITE_CONFIG = { navBorderAlways: true };</script>
  <script src="/components.js"></script>
</body>
</html>
