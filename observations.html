<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Misc — Nay Win Aung</title>
  <meta name="description" content="Sketches and photography by Nay Win Aung.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='26'>⌂</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@300;400&family=Quicksand:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f5f4f0;
      --ink:       #1a1a18;
      --ink-faint: #9a9890;
      --sans:      'Quicksand', sans-serif;
      --mono:      'DM Mono', monospace;
      --nav-h:     56px;
      --gutter:    clamp(24px, 5vw, 72px);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      font-weight: 400;
      font-size: 17px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ── */
    nav#main-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--gutter);
      background: var(--bg);
      z-index: 100;
      border-bottom: 1px solid #dddbd5;
    }
    .nav-logo {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 300;
      letter-spacing: .04em;
      color: var(--ink);
      text-decoration: none;
      white-space: nowrap;
    }
    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }
    .nav-links a {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 300;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--ink-faint);
      text-decoration: none;
      transition: color .2s;
    }
    .nav-links a:hover,
    .nav-links a.active { color: var(--ink); }

    /* ── MASONRY GRID ── */
    .page-wrap {
      margin-top: var(--nav-h);
      padding: 48px var(--gutter) 96px;
      max-width: 1400px;
      margin-left: auto;
      margin-right: auto;
    }

    .masonry {
      columns: 3;
      column-gap: 10px;
    }
    @media (max-width: 900px)  { .masonry { columns: 2; } }
    @media (max-width: 480px)  { .masonry { columns: 1; } }

    .masonry-item {
      break-inside: avoid;
      margin-bottom: 10px;
      cursor: pointer;
      overflow: hidden;
      display: block;
    }
    .masonry-item img {
      display: block;
      width: 100%;
      height: auto;
      transition: filter .3s ease;
    }
    .masonry-item:hover img {
      filter: brightness(.88);
    }

    /* ── LIGHTBOX ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(20,20,18,0.96);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lb-img {
      max-width: 90vw;
      max-height: 88vh;
      object-fit: contain;
      display: block;
      user-select: none;
    }
    #lb-close {
      position: absolute;
      top: 24px; right: 32px;
      font-family: var(--mono);
      font-size: 18px;
      color: #f5f4f0;
      background: none; border: none;
      cursor: pointer;
      opacity: .5;
      transition: opacity .2s;
      line-height: 1;
    }
    #lb-close:hover { opacity: 1; }
    #lb-prev, #lb-next {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      background: none; border: none;
      color: #f5f4f0;
      font-family: var(--mono);
      font-size: 22px;
      cursor: pointer;
      opacity: .4;
      transition: opacity .2s;
      padding: 28px 20px;
    }
    #lb-prev:hover, #lb-next:hover { opacity: 1; }
    #lb-prev { left: 12px; }
    #lb-next { right: 12px; }
    #lb-counter {
      position: absolute;
      bottom: 28px; left: 50%;
      transform: translateX(-50%);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .1em;
      color: rgba(245,244,240,.3);
      white-space: nowrap;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid #dddbd5;
      padding: 28px var(--gutter);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    footer span {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 300;
      letter-spacing: .1em;
      color: var(--ink-faint);
    }

    /* ── SCROLL TO TOP ── */
    #scroll-top {
      position: fixed;
      bottom: 36px; right: 36px;
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 1px solid #ccc;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s, border-color .2s, background .2s;
      z-index: 99;
    }
    #scroll-top.visible { opacity: 1; pointer-events: auto; }
    #scroll-top:hover { border-color: var(--ink); background: var(--ink); }
    #scroll-top svg {
      width: 14px; height: 14px;
      stroke: var(--ink); fill: none;
      stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
      transition: stroke .2s;
    }
    #scroll-top:hover svg { stroke: var(--bg); }
    @media (max-width: 480px) { #scroll-top { bottom: 20px; right: 20px; } }
  </style>
</head>
<body>

  <nav id="main-nav">
    <a href="/" class="nav-logo">/\/ \/\/ /\</a>
    <ul class="nav-links">
      <li><a href="/#works">Architecture</a></li>
      <li><a href="observations.html" class="active">Misc</a></li>
      <li><a href="/#resume">Resume</a></li>
      <li><a href="/#contact">Contact</a></li>
    </ul>
  </nav>

  <div class="page-wrap">
    <div class="masonry" id="masonry">
      <div class="masonry-item" data-index="0"><img src="images/misc/41.png" alt=""></div>
      <div class="masonry-item" data-index="1"><img src="images/misc/42.png" alt=""></div>
      <div class="masonry-item" data-index="2"><img src="images/misc/43.png" alt=""></div>
      <div class="masonry-item" data-index="3"><img src="images/misc/44.png" alt=""></div>
      <div class="masonry-item" data-index="4"><img src="images/misc/45.png" alt=""></div>
      <div class="masonry-item" data-index="5"><img src="images/misc/49707.jpg" alt=""></div>
      <div class="masonry-item" data-index="6"><img src="images/misc/49709_0.jpg" alt=""></div>
      <div class="masonry-item" data-index="7"><img src="images/misc/49712_0.jpg" alt=""></div>
      <div class="masonry-item" data-index="8"><img src="images/misc/49713_0.jpg" alt=""></div>
      <div class="masonry-item" data-index="9"><img src="images/misc/49715_0.jpg" alt=""></div>
      <div class="masonry-item" data-index="10"><img src="images/misc/49716_0.jpg" alt=""></div>
    </div>
  </div>

  <footer>
    <span>&#8220;Ars longa, vita brevis.&#8221; — Hippocrates</span>
    <span id="footer-year">&copy; 2026 Nay Win Aung all rights reserved</span>
  </footer>

  <!-- LIGHTBOX -->
  <div id="lightbox">
    <button id="lb-close" aria-label="Close">✕</button>
    <button id="lb-prev" aria-label="Previous">←</button>
    <img id="lb-img" src="" alt="">
    <button id="lb-next" aria-label="Next">→</button>
    <span id="lb-counter"></span>
  </div>

  <!-- SCROLL TO TOP -->
  <button id="scroll-top" aria-label="Back to top">
    <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
  </button>

  <script>
    /* ── FOOTER YEAR ── */
    document.getElementById('footer-year').textContent =
      '© ' + new Date().getFullYear() + ' Nay Win Aung all rights reserved';

    /* ── LIGHTBOX ── */
    const items = Array.from(document.querySelectorAll('.masonry-item'));
    const srcs  = items.map(el => el.querySelector('img').src);
    const lb    = document.getElementById('lightbox');
    const lbImg = document.getElementById('lb-img');
    const lbCtr = document.getElementById('lb-counter');
    let idx = 0;

    function openLb(i) {
      idx = i;
      lbImg.src = srcs[idx];
      lbCtr.textContent = (idx + 1) + ' / ' + srcs.length;
      lb.classList.add('open');
    }
    function step(dir) {
      idx = (idx + dir + srcs.length) % srcs.length;
      lbImg.src = srcs[idx];
      lbCtr.textContent = (idx + 1) + ' / ' + srcs.length;
    }

    items.forEach((el, i) => el.addEventListener('click', () => openLb(i)));
    document.getElementById('lb-close').addEventListener('click', () => lb.classList.remove('open'));
    document.getElementById('lb-prev').addEventListener('click', () => step(-1));
    document.getElementById('lb-next').addEventListener('click', () => step(1));
    lb.addEventListener('click', e => { if (e.target === lb) lb.classList.remove('open'); });
    document.addEventListener('keydown', e => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'ArrowLeft')  step(-1);
      if (e.key === 'ArrowRight') step(1);
      if (e.key === 'Escape') lb.classList.remove('open');
    });

    /* ── SCROLL TO TOP ── */
    const scrollBtn = document.getElementById('scroll-top');
    window.addEventListener('scroll', () => {
      scrollBtn.classList.toggle('visible', window.scrollY > 400);
    }, { passive: true });
    scrollBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
  </script>
</body>
</html>
